services:
  db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: arkus123
    ports:
      - 5432:5432
    networks:
      - db_network
    
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - 8080:8080
    networks:
      - db_network
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: icabrera@arkusnexus.com
      PGADMIN_DEFAULT_PASSWORD: arkus123
      # PGADMIN_LISTEN_ADDRESS: 0.0.0.0
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./tools/pgadmin_servers.json:/pgadmin4/servers.json
      - ./data:/pgadmin4/data
    networks:
      - db_network
    depends_on:
      db:
        condition: service_healthy

networks:
  db_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
